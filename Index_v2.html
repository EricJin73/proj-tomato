<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学一会 - 长期项目重启器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="学一会">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">⏳ 学一会</h1>
        <p class="text-sm text-gray-500 mb-6">不要想整个项目，只看眼前的几分钟。</p>

        <div id="input-section" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">你卡在哪了？(上次的进度)</label>
                <textarea id="project-context" rows="3" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：论文第三章的数据分析写了一半，不知道怎么开头..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">你现在有多少碎片时间？(分钟)</label>
                <input type="number" id="available-time" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="15">
            </div>
            <button onclick="generateTasks()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                召唤 AI 帮我拆解
            </button>
        </div>

        <div id="task-section" class="hidden space-y-6">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                <h2 class="text-sm font-bold text-blue-800 mb-2">💡 你的微任务：</h2>
                <div id="ai-task-text" class="text-gray-700 text-sm leading-relaxed">AI 正在为你精准拆解任务，请稍候... 🧠</div>
            </div>
            
            <div class="text-center">
                <div id="timer-display" class="text-5xl font-mono font-bold text-gray-800 mb-4">00:00</div>
                <button id="timer-btn" onclick="startTimer()" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 transition">
                    开始专注
                </button>
            </div>
        </div>
    </div>

    <script>
        let countdown;
        let timeLeft = 0;
        
        // 填入你刚才提供的 Gemini API Key
        const API_KEY = 'AIzaSyASY07rpUofgeuWa2ECbK1IDQeNo9y2-IM'; 
        // 使用目前响应极快且智能的 gemini-2.5-flash 模型
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        async function generateTasks() {
            const context = document.getElementById('project-context').value;
            const minutes = document.getElementById('available-time').value;

            if (!context || !minutes) {
                alert("请先告诉我要做什么，以及你有多少时间哦！");
                return;
            }

            // 切换 UI
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('task-section').classList.remove('hidden');
            
            // 初始化倒计时
            timeLeft = minutes * 60;
            updateTimerDisplay();

            const taskTextElement = document.getElementById('ai-task-text');
            taskTextElement.innerHTML = "AI 正在为你精准拆解任务，请稍候... 🧠";

            // 精心设计的提示词 (Prompt)
            const promptText = `你是一个反拖延症教练。你的任务是把庞大的长期项目，拆解为极其简单、具体、不需要消耗意志力就能开始的'微任务'。不要说废话，直接输出 1-2 个具体的行动指令。不同任务之间请使用 HTML 的 <br><br> 标签换行。\n\n用户的项目上次停在：${context}。\n用户现在只有 ${minutes} 分钟的碎片时间。\n请直接给出立刻能做的微任务。`;

            try {
                // 向 Gemini 发送真实的 HTTP 请求
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: promptText }]
                        }]
                    })
                });

                const data = await response.json();
                
                // 解析 Gemini API 的返回结果
                if (data.candidates && data.candidates.length > 0) {
                    let text = data.candidates[0].content.parts[0].text;
                    // 清理可能产生的 Markdown 格式干扰，确保网页排版干净
                    text = text.replace(/```html/g, '').replace(/```/g, '');
                    taskTextElement.innerHTML = text;
                } else {
                    taskTextElement.innerHTML = "获取数据异常，请检查 API 配置或网络。";
                    console.error("API 返回异常:", data);
                }

            } catch (error) {
                console.error("请求失败:", error);
                taskTextElement.innerHTML = "哎呀，网络开小差了。请检查你的网络连接。";
            }
        }

        // 极简番茄钟逻辑
        function startTimer() {
            const btn = document.getElementById('timer-btn');
            btn.innerText = "专注中...";
            btn.disabled = true;
            btn.classList.replace('bg-green-500', 'bg-gray-400');

            countdown = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("时间到！辛苦啦，现在你可以稍作休息，或者记录一下刚才推进了多少。");
                    btn.innerText = "完成打卡";
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-400', 'bg-blue-600');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').innerText =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
