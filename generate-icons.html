<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>生成图标</title></head>
<body>
<script>
function drawHourglass(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;

  // 背景圆角矩形（蓝色）
  const r = s * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#2563eb';
  ctx.fill();

  // 沙漏参数
  const cx = s / 2;
  const topY = s * 0.18;
  const botY = s * 0.82;
  const wideW = s * 0.32;
  const neckW = s * 0.04;
  const midY = s / 2;

  // 沙漏外框（白色描边）
  ctx.beginPath();
  ctx.moveTo(cx - wideW, topY);
  ctx.lineTo(cx + wideW, topY);
  ctx.lineTo(cx + neckW, midY);
  ctx.lineTo(cx + wideW, botY);
  ctx.lineTo(cx - wideW, botY);
  ctx.lineTo(cx - neckW, midY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = s * 0.04;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // 上半部分沙子（白色，填充上三角约70%）
  const sandTopH = (midY - topY) * 0.7;
  const sandTopY = topY + (midY - topY) * 0.3;
  // 计算 sandTopY 处的宽度（线性插值）
  const t = (sandTopY - topY) / (midY - topY);
  const sandTopW = wideW - t * (wideW - neckW);

  ctx.beginPath();
  ctx.moveTo(cx - sandTopW, sandTopY);
  ctx.lineTo(cx + sandTopW, sandTopY);
  ctx.lineTo(cx + neckW, midY);
  ctx.lineTo(cx - neckW, midY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();

  // 下半部分沙子（白色，底部堆积约40%高度）
  const sandBotH = (botY - midY) * 0.45;
  const sandBotTop = botY - sandBotH;
  const t2 = (sandBotTop - midY) / (botY - midY);
  const sandBotW = neckW + t2 * (wideW - neckW);

  ctx.beginPath();
  ctx.moveTo(cx - sandBotW, sandBotTop);
  ctx.lineTo(cx + sandBotW, sandBotTop);
  ctx.lineTo(cx + wideW, botY);
  ctx.lineTo(cx - wideW, botY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();

  // 顶部和底部横线
  ctx.beginPath();
  ctx.moveTo(cx - wideW - s*0.02, topY);
  ctx.lineTo(cx + wideW + s*0.02, topY);
  ctx.moveTo(cx - wideW - s*0.02, botY);
  ctx.lineTo(cx + wideW + s*0.02, botY);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = s * 0.055;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function generateAndDownload(size, filename) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  drawHourglass(canvas, size);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 自动下载两个尺寸
window.onload = () => {
  setTimeout(() => generateAndDownload(192, 'icon-192.png'), 300);
  setTimeout(() => generateAndDownload(512, 'icon-512.png'), 800);
  document.body.innerHTML = '<p style="font-family:sans-serif;padding:20px">图标已生成，请将下载的两个文件放入 <code>icons/</code> 文件夹后关闭此页面。</p>';
};
</script>
</body>
</html>
